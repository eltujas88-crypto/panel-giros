<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Giros V6</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#08111f;
color:white;
padding:12px;
}

.container{
max-width:700px;
margin:auto;
}

.panel{
background:#111c31;
padding:15px;
border-radius:20px;
margin-bottom:15px;
}

label{
display:block;
margin-top:10px;
margin-bottom:5px;
font-weight:bold;
}

input,
select{
width:100%;
height:50px;
border:none;
border-radius:12px;
padding:0 12px;
background:#1c2b48;
color:white;
}

.row{
display:flex;
gap:10px;
}

.col{
flex:1;
}
button{

height:50px;

border:none;

border-radius:12px;

font-weight:800;

cursor:pointer;

}

#btnLimpiar{

background:#374151;
color:white;

}

#btnGuardar{

background:#f5b400;
color:#111;

}

.tarjeta{
border-radius:25px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.encabezado{
padding:18px;
text-align:center;
}

.donsol{
background:linear-gradient(135deg,#ffe9a6,#d4a017,#8a5f00);
color:#111;
}

.chaskys{
background:linear-gradient(135deg,#2b9cff,#003fbb);
}

.pacena{
background:linear-gradient(135deg,#ff5252,#870000);
}

.tituloEmpresa{
font-size:30px;
font-weight:900;
}

.operacion{
margin-top:8px;
font-size:16px;
font-weight:bold;
}

.contenido{
background:#111827;
padding:20px;
}

.infoBox{
background:rgba(255,255,255,.05);
padding:12px;
border-radius:15px;
}

.infoRow{
display:flex;
justify-content:space-between;
padding:5px 0;
}

.seccionTitulo{
text-align:center;
font-size:20px;
font-weight:800;
margin-top:20px;
}

.montoSec{
text-align:center;
font-size:36px;
font-weight:900;
}

.montoPrin{
text-align:center;
font-size:50px;
font-weight:900;
}

.moneda{
text-align:center;
font-size:24px;
font-weight:bold;
}

.pacenaLinea{
display:flex;
flex-wrap:wrap;
justify-content:center;
align-items:center;
gap:10px;
font-size:20px;
font-weight:900;
margin-top:25px;
}

</style>
</head>
<body>



<div class="container">

<div class="panel">

<label>Empresa</label>

<select id="empresa">
<option value="donsol">DONSOL</option>
<option value="chaskys">CHASKYS GIROS</option>
<option value="pacena">LA PACEÑA</option>
</select>

<label>Operación</label>

<select id="operacion">
<option value="bs_soles">Bolivianos → Soles</option>
<option value="soles_bs">Soles → Bolivianos</option>
</select>

<div class="row">

<div class="col">
<label>Bs→Soles</label>
<input id="tcBs" value="2.92">
</div>

<div class="col">
<label>Soles→Bs</label>
<input id="tcSb" value="2.75">
</div>

</div>

<div class="row">

<div class="col">
<label>Comisión %</label>
<input id="comision" value="3">
</div>

<div class="col">
<label>Ajuste DONSOL</label>
<input id="ajuste" value="0.03">
</div>

</div>

<label>DEPOSITAR</label>
<input id="depositar">

<label>RECIBE</label>
<input id="recibe">
<div class="row" style="margin-top:15px;">

<button id="btnLimpiar">
LIMPIAR
</button>

<button id="btnGuardar">
GUARDAR IMAGEN
</button>

</div>

</div>
<div id="tarjeta" class="tarjeta">

<div id="encabezado" class="encabezado donsol">

<div id="tituloEmpresa" class="tituloEmpresa">
CAMBIOS DONSOL
</div>

<div id="operacionTexto" class="operacion">
BOLIVIANOS → SOLES
</div>

</div>

<div class="contenido">

<div class="infoBox">

<div class="infoRow">
<span>Tipo de Cambio</span>
<strong id="tipoVista">2.95</strong>
</div>

<div class="infoRow" id="filaComision">
<span>Comisión</span>
<strong id="comisionVista">3%</strong>
</div>

</div>

<!-- DONSOL Y CHASKYS -->

<div id="modoNormal">

<div class="seccionTitulo">
USTED ENVÍA
</div>

<div id="enviaVista" class="montoSec">
0.00
</div>

<div class="seccionTitulo" id="textoRecibe">
RECIBE
</div>

<div id="recibeVista" class="montoPrin">
0.00
</div>

<div id="monedaVista" class="moneda">
SOLES
</div>

</div>

<!-- LA PACEÑA -->

<div id="modoPacena" style="display:none;">

<div class="pacenaLinea">

<span>DEPOSITAR</span>

<strong id="depositarPacena">
0.00
</strong>

<span id="monedaDepositaPacena">
SOLES
</span>

<span>PARA</span>

<strong id="paraPacena">
0.00
</strong>

<span id="monedaPacena">
BS
</span>

</div>

</div>

</div>

</div>

</div>
<script>

const empresa=document.getElementById("empresa");
const operacion=document.getElementById("operacion");

const tcBs=document.getElementById("tcBs");
const tcSb=document.getElementById("tcSb");

const comision=document.getElementById("comision");
const ajuste=document.getElementById("ajuste");

const depositar=document.getElementById("depositar");
const recibe=document.getElementById("recibe");

let ultimoCampo="depositar";

function f(n){
 return Number(n).toFixed(2);
}

function actualizar(){

 let emp=empresa.value;
 let op=operacion.value;

 let tc=
 op==="bs_soles"
 ?parseFloat(tcBs.value||0)
 :parseFloat(tcSb.value||0);

 let com=
 parseFloat(comision.value||0)/100;

 let aj=
 parseFloat(ajuste.value||0);

 let valorDepositar=
 parseFloat(depositar.value||0);

 let valorRecibe=
 parseFloat(recibe.value||0);

 const encabezado=
 document.getElementById("encabezado");

 const tituloEmpresa=
 document.getElementById("tituloEmpresa");

 const operacionTexto=
 document.getElementById("operacionTexto");

 const filaComision=
 document.getElementById("filaComision");

 const tipoVista=
 document.getElementById("tipoVista");

 const comisionVista=
 document.getElementById("comisionVista");

 const enviaVista=
 document.getElementById("enviaVista");

 const recibeVista=
 document.getElementById("recibeVista");

 const monedaVista=
 document.getElementById("monedaVista");

 const textoRecibe=
 document.getElementById("textoRecibe");

 const modoNormal=
 document.getElementById("modoNormal");

 const modoPacena=
 document.getElementById("modoPacena");

 const depositarPacena=
 document.getElementById("depositarPacena");

 const paraPacena=
 document.getElementById("paraPacena");

 const monedaPacena=
 document.getElementById("monedaPacena");

 const monedaDepositaPacena=
 document.getElementById("monedaDepositaPacena");

 encabezado.className="encabezado";

 if(emp==="donsol"){

   encabezado.classList.add("donsol");

   tituloEmpresa.innerHTML=
   "CAMBIOS DONSOL";

   filaComision.style.display="none";

   textoRecibe.innerHTML="RECIBE";

   tc=
   op==="bs_soles"
   ?tc+aj
   :tc-aj;

 }

 if(emp==="chaskys"){

   encabezado.classList.add("chaskys");

   tituloEmpresa.innerHTML=
   "CHASKYS GIROS";

   filaComision.style.display="flex";

   textoRecibe.innerHTML=
   "BENEFICIARIO RECIBE";

 }

 if(emp==="pacena"){

   encabezado.classList.add("pacena");

   tituloEmpresa.innerHTML=
   "TRANSPORTADORA<br>LA PACEÑA";

   filaComision.style.display="flex";

 }

 operacionTexto.innerHTML=
 op==="bs_soles"
 ?"BOLIVIANOS → SOLES"
 :"SOLES → BOLIVIANOS";

 tipoVista.innerHTML=f(tc);

 comisionVista.innerHTML=
 (com*100)+"%";

 let envia=0;
 let recibeCalc=0;

 if(ultimoCampo==="depositar"){

   envia=valorDepositar;

   if(emp==="donsol"){

      if(op==="bs_soles"){

         recibeCalc=envia/tc;

      }else{

         recibeCalc=envia*tc;

      }

   }else{

      if(op==="bs_soles"){

         let bruto=envia/tc;

         recibeCalc=
         bruto-(bruto*com);

      }else{

         let bruto=
         envia*tc;

         recibeCalc=
         bruto-(bruto*com);

      }

   }

   recibe.value=f(recibeCalc);

 }else{

   recibeCalc=valorRecibe;

   if(emp==="donsol"){

      if(op==="bs_soles"){

         envia=
         recibeCalc*tc;

      }else{

         envia=
         recibeCalc/tc;

      }

   }else{

      if(op==="bs_soles"){

         let bruto=
         recibeCalc/(1-com);

         envia=
         bruto*tc;

      }else{

         let bruto=
         recibeCalc/(1-com);

         envia=
         bruto/tc;

      }

   }

   depositar.value=f(envia);

 }

 enviaVista.innerHTML=
 f(depositar.value||0);

 recibeVista.innerHTML=
 f(recibe.value||0);

 monedaVista.innerHTML=
 op==="bs_soles"
 ?"SOLES"
 :"BS";

 depositarPacena.innerHTML=
 f(depositar.value||0);

 paraPacena.innerHTML=
 f(recibe.value||0);

 monedaDepositaPacena.innerHTML=
 op==="bs_soles"
 ?"BS"
 :"SOLES";

 monedaPacena.innerHTML=
 op==="bs_soles"
 ?"SOLES"
 :"BS";

 if(emp==="pacena"){

   modoNormal.style.display="none";
   modoPacena.style.display="block";

 }else{

   modoNormal.style.display="block";
   modoPacena.style.display="none";

 }

}

depositar.addEventListener("input",()=>{

 ultimoCampo="depositar";
 actualizar();

});

recibe.addEventListener("input",()=>{

 ultimoCampo="recibe";
 actualizar();

});

empresa.addEventListener("change",actualizar);
operacion.addEventListener("change",actualizar);

tcBs.addEventListener("input",actualizar);
tcSb.addEventListener("input",actualizar);

comision.addEventListener("input",actualizar);
ajuste.addEventListener("input",actualizar);
document.getElementById("btnLimpiar")
.addEventListener("click",()=>{

depositar.value="";
recibe.value="";

actualizar();

});

document.getElementById("btnGuardar")
.addEventListener("click",()=>{

html2canvas(
document.getElementById("tarjeta")
).then(canvas=>{

let link=
document.createElement("a");

link.download=
"cotizacion.png";

link.href=
canvas.toDataURL();

link.click();

});

});

actualizar();

</script>

</body>
</html>
