<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Giros | Estilo Limpio - Bidireccional</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0a0f1a;
  font-family: 'Roboto', sans-serif;
  color: white;
  padding: 20px;
}

.container {
  max-width: 750px;
  margin: auto;
}

/* PANEL DE CONTROL */
.panel {
  background: #111c31;
  padding: 20px;
  border-radius: 0px;
  margin-bottom: 25px;
  border: 1px solid #1f3a5f;
}

/* FILA SUPERIOR */
.top-bar {
  display: flex;
  gap: 12px;
  align-items: flex-end;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.top-bar .field {
  flex: 1;
  min-width: 140px;
}

.field {
  margin-bottom: 0;
}

.field label {
  display: block;
  margin-bottom: 6px;
  font-weight: 700;
  font-size: 0.7rem;
  letter-spacing: 1px;
  color: #9bb5d4;
  text-transform: uppercase;
}

.field select, .field input {
  width: 100%;
  height: 48px;
  border: none;
  border-radius: 0px;
  padding: 0 15px;
  background: #1c2b48;
  color: #f5c542;
  font-weight: 600;
  font-family: 'Oswald', sans-serif;
  font-size: 0.95rem;
}

.btn-toggle {
  background: linear-gradient(135deg, #2a3a55, #1f2e48);
  border: 1px solid #f5b400;
  color: #f5b400;
  height: 48px;
  padding: 0 20px;
  border-radius: 0px;
  font-weight: 800;
  font-family: 'Oswald', sans-serif;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-toggle:hover {
  background: #f5b400;
  color: #111;
  border-color: #f5b400;
}

/* PANEL DE AJUSTES OCULTABLE */
.ajustes-panel {
  background: #0f1825;
  border-radius: 0px;
  padding: 16px 18px;
  margin: 16px 0 12px 0;
  border: 1px solid #2a3a55;
  transition: all 0.3s ease;
}

.ajustes-panel.hidden {
  display: none;
}

.ajustes-grid {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}

.ajustes-grid .field {
  flex: 1;
  min-width: 120px;
}

.ajustes-grid .field input {
  height: 44px;
  font-size: 0.9rem;
  border-radius: 0px;
}

/* FILA DEPOSITAR / RECIBE - LIMPIA */
.monto-row {
  display: flex;
  gap: 14px;
  margin: 16px 0 20px 0;
  flex-wrap: wrap;
}

.monto-field {
  flex: 1;
}

.monto-field label {
  display: block;
  margin-bottom: 6px;
  font-weight: 700;
  font-size: 0.7rem;
  letter-spacing: 1px;
  color: #9bb5d4;
  text-transform: uppercase;
}

.monto-field input {
  width: 100%;
  height: 52px;
  border: 1px solid #2a3a55;
  border-radius: 0px;
  padding: 0 15px;
  background: #1c2b48;
  color: #f5c542;
  font-weight: 700;
  font-family: 'Oswald', sans-serif;
  font-size: 1.1rem;
  transition: all 0.2s;
}

.monto-field input:focus {
  background: #253a5a;
  border-color: #f5b400;
}

.monto-field input::placeholder {
  color: #5a6e8a;
  font-weight: 500;
  font-family: 'Roboto', sans-serif;
  font-size: 0.9rem;
}

/* BOTONES */
.btn-group {
  display: flex;
  gap: 12px;
  margin-top: 10px;
}

button {
  height: 52px;
  border: none;
  border-radius: 0px;
  font-weight: 800;
  font-family: 'Oswald', sans-serif;
  font-size: 0.9rem;
  letter-spacing: 1px;
  cursor: pointer;
  transition: transform 0.1s, filter 0.2s;
  flex: 1;
}

#btnLimpiar {
  background: #2a3a55;
  color: white;
  border: 1px solid #3e5a7c;
}

#btnGuardar {
  background: linear-gradient(135deg, #f5b400, #d49a00);
  color: #111;
}

button:active {
  transform: scale(0.97);
}

/* ============================================= */
/* TARJETA PRINCIPAL - ESQUINAS RECTAS */
/* ============================================= */
.tarjeta {
  border-radius: 0px;
  overflow: hidden;
  box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5);
  transition: transform 0.2s;
  background: #0f1622;
}

.tarjeta:hover {
  transform: translateY(-3px);
}

/* ENCABEZADOS */
.encabezado {
  padding: 22px 18px;
  text-align: center;
}

.donsol {
  background: linear-gradient(135deg, #1a1200, #0d0800, #1a0e00);
  color: #f0c84a;
  border-bottom: 1px solid #c9a84c;
}

.chaskys {
  background: linear-gradient(135deg, #0a1e3c, #001a4a);
  border-bottom: 2px solid #3a7adf;
  color: #5aaaf0;
}

.pacena {
  background: linear-gradient(135deg, #6a0f0f, #3a0505, #5a0a0a);
  border-bottom: 2px solid #ff6666;
  color: #ffffff;
  text-shadow: 0 1px 2px rgba(0,0,0,0.3);
}

.tituloEmpresa {
  font-family: 'Oswald', sans-serif;
  font-size: 32px;
  font-weight: 800;
  letter-spacing: 2px;
  text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  line-height: 1.2;
  color: inherit;
}

.operacion {
  margin-top: 10px;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 2px;
  font-family: 'Roboto', sans-serif;
  background: rgba(0,0,0,0.35);
  display: inline-block;
  padding: 5px 20px;
  border-radius: 0px;
  backdrop-filter: blur(2px);
  color: inherit;
}

/* CONTENIDO */
.contenido {
  background: #0f1622;
  padding: 24px 22px;
}

/* TABLA ESTILO LIMPIO */
.infoBox {
  background: rgba(255, 255, 255, 0.03);
  border-radius: 0px;
  padding: 12px 18px;
  margin-bottom: 20px;
  border: 1px solid rgba(255, 215, 0, 0.15);
}

.infoRow {
  display: flex;
  justify-content: space-between;
  padding: 12px 5px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  font-size: 0.9rem;
  font-weight: 500;
}

.infoRow:last-child {
  border-bottom: none;
}

.infoRow span {
  color: #b9c3dc;
  text-transform: uppercase;
  font-weight: 600;
  letter-spacing: 1px;
  font-size: 0.8rem;
}

.infoRow strong {
  color: #f3cd81;
  font-family: 'Oswald', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.5px;
}

/* Para La Paceña */
.tarjeta.pacena .infoRow strong {
  color: #ffccaa;
}
.tarjeta.pacena .infoBox {
  border-color: rgba(255, 100, 100, 0.4);
  background: rgba(80, 20, 20, 0.2);
}
.tarjeta.pacena .infoRow span {
  color: #ffc0c0;
}

/* SECCIONES */
.seccionTitulo {
  text-align: center;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: #9ca9c7;
  margin-top: 20px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

.seccionTitulo::before,
.seccionTitulo::after {
  content: '';
  flex: 1;
  height: 1px;
  background: currentColor;
  opacity: 0.25;
}

.montoSec {
  text-align: center;
  font-size: 28px;
  font-weight: 700;
  font-family: 'Oswald', sans-serif;
  color: #f3cd81;
  letter-spacing: 1px;
}

.montoPrin {
  text-align: center;
  font-size: 52px;
  font-weight: 800;
  font-family: 'Oswald', sans-serif;
  color: #f5b400;
  text-shadow: 0 2px 6px rgba(0,0,0,0.3);
  letter-spacing: 2px;
  margin: 8px 0;
}

.moneda {
  text-align: center;
  font-size: 18px;
  font-weight: 700;
  color: #d4b86a;
  text-transform: uppercase;
  letter-spacing: 3px;
}

/* ESTILO LA PACEÑA */
.pacenaLinea {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: baseline;
  gap: 12px;
  font-size: 18px;
  font-weight: 800;
  margin: 25px 0 15px;
  background: rgba(100, 20, 20, 0.7);
  padding: 20px 16px;
  border-radius: 0px;
  border: 1px solid #ff7777;
  box-shadow: 0 0 15px rgba(255, 80, 80, 0.2);
}

.pacenaLinea span {
  color: #ffe0e0;
  font-weight: 600;
  letter-spacing: 1px;
}

.pacenaLinea strong {
  font-size: 32px;
  font-family: 'Oswald', sans-serif;
  color: #ffffff;
  text-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
  background: rgba(0,0,0,0.2);
  padding: 4px 12px;
  border-radius: 0px;
}

/* FOOTER DE VALIDEZ */
.validityFooter {
  margin-top: 22px;
  text-align: center;
  font-size: 0.65rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #6c7b9e;
  border-top: 1px solid rgba(255,215,0,0.15);
  padding-top: 16px;
}

.tarjeta.pacena .validityFooter {
  color: #ccaa99;
  border-top-color: rgba(255,100,100,0.3);
}

/* RESPONSIVE */
@media (max-width: 650px) {
  .container { max-width: 100%; }
  .top-bar { flex-direction: column; }
  .ajustes-grid { flex-direction: column; }
  .monto-row { flex-direction: column; }
  .montoPrin { font-size: 38px; }
  .pacenaLinea strong { font-size: 24px; }
}
</style>
</head>
<body>

<div class="container">

  <!-- PANEL DE CONTROL -->
  <div class="panel">
    <!-- Fila superior -->
    <div class="top-bar">
      <div class="field">
        <label>EMPRESA</label>
        <select id="empresa">
          <option value="donsol">CAMBIOS DONSOL</option>
          <option value="chaskys">CHASKYS GIROS</option>
          <option value="pacena">TRANSPORTADORA LA PACEÑA</option>
        </select>
      </div>
      <div class="field">
        <label>OPERACIÓN</label>
        <select id="operacion">
          <option value="bs_soles">Bolivianos → Soles</option>
          <option value="soles_bs">Soles → Bolivianos</option>
        </select>
      </div>
      <button class="btn-toggle" id="btnToggleAjustes">⚙️ AJUSTES</button>
    </div>

    <!-- PANEL OCULTABLE DE AJUSTES -->
    <div id="ajustesPanel" class="ajustes-panel hidden">
      <div class="ajustes-grid">
        <div class="field">
          <label>BS → SOLES</label>
          <input id="tcBs" value="2.92" step="0.01" type="number">
        </div>
        <div class="field">
          <label>SOLES → BS</label>
          <input id="tcSb" value="2.75" step="0.01" type="number">
        </div>
        <div class="field">
          <label>COMISIÓN (%)</label>
          <input id="comision" value="3" step="0.1" type="number">
        </div>
        <div class="field">
          <label>AJUSTE DONSOL</label>
          <input id="ajuste" value="0.03" step="0.01" type="number">
        </div>
      </div>
    </div>

    <!-- DEPOSITAR y RECIBE - Ambos funcionales -->
    <div class="monto-row">
      <div class="monto-field">
        <label>DEPOSITAR</label>
        <input id="depositar" placeholder="Ingrese monto" type="number">
      </div>
      <div class="monto-field">
        <label>RECIBE</label>
        <input id="recibe" placeholder="Ingrese monto" type="number">
      </div>
    </div>

    <!-- Botones -->
    <div class="btn-group">
      <button id="btnLimpiar">LIMPIAR</button>
      <button id="btnGuardar">📸 GUARDAR IMAGEN</button>
    </div>
  </div>

  <!-- TARJETA PRINCIPAL -->
  <div id="tarjeta" class="tarjeta">
    <div id="encabezado" class="encabezado donsol">
      <div id="tituloEmpresa" class="tituloEmpresa">CAMBIOS DONSOL</div>
      <div id="operacionTexto" class="operacion">BOLIVIANOS → SOLES</div>
    </div>

    <div class="contenido">
      <div class="infoBox">
        <div class="infoRow">
          <span>TIPO DE CAMBIO</span>
          <strong id="tipoVista">2.95</strong>
        </div>
        <div class="infoRow" id="filaComision">
          <span>COMISIÓN</span>
          <strong id="comisionVista">3%</strong>
        </div>
      </div>

      <div id="modoNormal">
        <div class="seccionTitulo">USTED ENVÍA</div>
        <div id="enviaVista" class="montoSec">0.00</div>

        <div class="seccionTitulo" id="textoRecibe">RECIBE</div>
        <div id="recibeVista" class="montoPrin">0.00</div>
        <div id="monedaVista" class="moneda">SOLES</div>
      </div>

      <div id="modoPacena" style="display:none;">
        <div class="pacenaLinea">
          <span>DEPOSITAR</span>
          <strong id="depositarPacena">0.00</strong>
          <span id="monedaDepositaPacena">BS</span>
          <span>→</span>
          <span>RECIBE</span>
          <strong id="paraPacena">0.00</strong>
          <span id="monedaPacena">SOLES</span>
        </div>
      </div>

      <div class="validityFooter">
        Cotización referencial · Vigencia 15 min
      </div>
    </div>
  </div>
</div>

<script>
// ==================== CÓDIGO COMPLETO BIDIRECCIONAL ====================
const empresa = document.getElementById("empresa");
const operacion = document.getElementById("operacion");
const tcBs = document.getElementById("tcBs");
const tcSb = document.getElementById("tcSb");
const comision = document.getElementById("comision");
const ajuste = document.getElementById("ajuste");
const depositarInput = document.getElementById("depositar");
const recibeInput = document.getElementById("recibe");
const btnToggle = document.getElementById("btnToggleAjustes");
const ajustesPanel = document.getElementById("ajustesPanel");

let ultimoCampo = "depositar";

// Toggle
btnToggle.addEventListener("click", () => {
  ajustesPanel.classList.toggle("hidden");
  btnToggle.innerHTML = ajustesPanel.classList.contains("hidden") ? "⚙️ AJUSTES" : "🔽 OCULTAR AJUSTES";
});

function f(n) {
  if (isNaN(n) || n === null || n === undefined) return "0.00";
  return Number(n).toFixed(2);
}

function calcularDesdeDepositar() {
  let emp = empresa.value;
  let op = operacion.value;
  
  let tc = op === "bs_soles"
    ? parseFloat(tcBs.value || 0)
    : parseFloat(tcSb.value || 0);
  
  let com = parseFloat(comision.value || 0) / 100;
  let aj = parseFloat(ajuste.value || 0);
  
  if (emp === "donsol") {
    tc = op === "bs_soles" ? tc + aj : tc - aj;
  }
  
  let depositoVal = parseFloat(depositarInput.value || 0);
  let resultado = 0;
  
  if (emp === "donsol") {
    if (op === "bs_soles") {
      resultado = depositoVal / tc;
    } else {
      resultado = depositoVal * tc;
    }
  } else {
    if (op === "bs_soles") {
      let bsBase = depositoVal / (1 + com);
      resultado = bsBase / tc;
    } else {
      let bsBase = depositoVal * tc;
      resultado = bsBase - (bsBase * com);
    }
  }
  
  recibeInput.value = f(resultado);
}

function calcularDesdeRecibe() {
  let emp = empresa.value;
  let op = operacion.value;
  
  let tc = op === "bs_soles"
    ? parseFloat(tcBs.value || 0)
    : parseFloat(tcSb.value || 0);
  
  let com = parseFloat(comision.value || 0) / 100;
  let aj = parseFloat(ajuste.value || 0);
  
  if (emp === "donsol") {
    tc = op === "bs_soles" ? tc + aj : tc - aj;
  }
  
  let recibeVal = parseFloat(recibeInput.value || 0);
  let resultado = 0;
  
  if (emp === "donsol") {
    if (op === "bs_soles") {
      resultado = recibeVal * tc;
    } else {
      resultado = recibeVal / tc;
    }
  } else {
    if (op === "bs_soles") {
      let bsBase = recibeVal * tc;
      resultado = bsBase + (bsBase * com);
    } else {
      let bsBase = recibeVal / (1 - com);
      resultado = bsBase / tc;
    }
  }
  
  depositarInput.value = f(resultado);
}

function actualizarTodo() {
  if (ultimoCampo === "depositar") {
    if (depositarInput.value !== "") {
      calcularDesdeDepositar();
    } else {
      recibeInput.value = "";
    }
  } else {
    if (recibeInput.value !== "") {
      calcularDesdeRecibe();
    } else {
      depositarInput.value = "";
    }
  }
  
  // Actualizar vista de la tarjeta
  let emp = empresa.value;
  let op = operacion.value;
  
  let tc = op === "bs_soles"
    ? parseFloat(tcBs.value || 0)
    : parseFloat(tcSb.value || 0);
  
  let com = parseFloat(comision.value || 0) / 100;
  let aj = parseFloat(ajuste.value || 0);
  
  if (emp === "donsol") {
    tc = op === "bs_soles" ? tc + aj : tc - aj;
  }
  
  const encabezado = document.getElementById("encabezado");
  const tituloEmpresa = document.getElementById("tituloEmpresa");
  const operacionTexto = document.getElementById("operacionTexto");
  const filaComision = document.getElementById("filaComision");
  const tipoVista = document.getElementById("tipoVista");
  const comisionVista = document.getElementById("comisionVista");
  const enviaVista = document.getElementById("enviaVista");
  const recibeVista = document.getElementById("recibeVista");
  const monedaVista = document.getElementById("monedaVista");
  const textoRecibe = document.getElementById("textoRecibe");
  const modoNormal = document.getElementById("modoNormal");
  const modoPacena = document.getElementById("modoPacena");
  const depositarPacena = document.getElementById("depositarPacena");
  const paraPacena = document.getElementById("paraPacena");
  const monedaPacena = document.getElementById("monedaPacena");
  const monedaDepositaPacena = document.getElementById("monedaDepositaPacena");
  
  encabezado.className = "encabezado";
  encabezado.classList.remove("donsol", "chaskys", "pacena");
  
  if (emp === "donsol") {
    encabezado.classList.add("donsol");
    tituloEmpresa.innerHTML = "CAMBIOS DONSOL";
    filaComision.style.display = "flex";
    textoRecibe.innerHTML = "RECIBE";
  } else if (emp === "chaskys") {
    encabezado.classList.add("chaskys");
    tituloEmpresa.innerHTML = "CHASKYS GIROS";
    filaComision.style.display = "flex";
    textoRecibe.innerHTML = "BENEFICIARIO RECIBE";
  } else if (emp === "pacena") {
    encabezado.classList.add("pacena");
    tituloEmpresa.innerHTML = "TRANSPORTADORA<br>LA PACEÑA";
    filaComision.style.display = "flex";
    textoRecibe.innerHTML = "RECIBE";
  }
  
  operacionTexto.innerHTML = op === "bs_soles" ? "BOLIVIANOS → SOLES" : "SOLES → BOLIVIANOS";
  tipoVista.innerHTML = f(tc);
  comisionVista.innerHTML = (com * 100) + "%";
  
  const montoMostrar = depositarInput.value === "" ? "0.00" : f(parseFloat(depositarInput.value) || 0);
  const recibeMostrar = recibeInput.value === "" ? "0.00" : f(parseFloat(recibeInput.value) || 0);
  
  enviaVista.innerHTML = montoMostrar;
  recibeVista.innerHTML = recibeMostrar;
  
  monedaVista.innerHTML = op === "bs_soles" ? "SOLES" : "BS";
  
  depositarPacena.innerHTML = montoMostrar;
  paraPacena.innerHTML = recibeMostrar;
  monedaDepositaPacena.innerHTML = op === "bs_soles" ? "BS" : "SOLES";
  monedaPacena.innerHTML = op === "bs_soles" ? "SOLES" : "BS";
  
  const tarjetaElem = document.getElementById("tarjeta");
  if (emp === "pacena") {
    modoNormal.style.display = "none";
    modoPacena.style.display = "block";
    tarjetaElem.classList.add("pacena");
  } else {
    modoNormal.style.display = "block";
    modoPacena.style.display = "none";
    tarjetaElem.classList.remove("pacena");
  }
}

// Eventos
depositarInput.addEventListener("input", () => {
  ultimoCampo = "depositar";
  actualizarTodo();
});

recibeInput.addEventListener("input", () => {
  ultimoCampo = "recibe";
  actualizarTodo();
});

empresa.addEventListener("change", () => {
  if (ultimoCampo === "depositar") {
    calcularDesdeDepositar();
  } else {
    calcularDesdeRecibe();
  }
  actualizarTodo();
});

operacion.addEventListener("change", () => {
  if (ultimoCampo === "depositar") {
    calcularDesdeDepositar();
  } else {
    calcularDesdeRecibe();
  }
  actualizarTodo();
});

tcBs.addEventListener("input", () => {
  if (ultimoCampo === "depositar") {
    calcularDesdeDepositar();
  } else {
    calcularDesdeRecibe();
  }
  actualizarTodo();
});

tcSb.addEventListener("input", () => {
  if (ultimoCampo === "depositar") {
    calcularDesdeDepositar();
  } else {
    calcularDesdeRecibe();
  }
  actualizarTodo();
});

comision.addEventListener("input", () => {
  if (ultimoCampo === "depositar") {
    calcularDesdeDepositar();
  } else {
    calcularDesdeRecibe();
  }
  actualizarTodo();
});

ajuste.addEventListener("input", () => {
  if (ultimoCampo === "depositar") {
    calcularDesdeDepositar();
  } else {
    calcularDesdeRecibe();
  }
  actualizarTodo();
});

document.getElementById("btnLimpiar").addEventListener("click", () => {
  depositarInput.value = "";
  recibeInput.value = "";
  ultimoCampo = "depositar";
  actualizarTodo();
});

// Guardar imagen
function guardarImagen() {
  const tarjetaElem = document.getElementById("tarjeta");
  tarjetaElem.style.transform = "translateZ(0)";
  
  html2canvas(tarjetaElem, {
    scale: 2.5,
    backgroundColor: "#0f1622",
    logging: false,
    useCORS: false,
    allowTaint: false
  }).then(canvas => {
    const link = document.createElement("a");
    const empresaActual = empresa.value;
    let nombreArchivo = "cotizacion.png";
    if (empresaActual === "donsol") nombreArchivo = "cotizacion_donsol.png";
    else if (empresaActual === "chaskys") nombreArchivo = "cotizacion_chaskys.png";
    else if (empresaActual === "pacena") nombreArchivo = "cotizacion_lapacena.png";
    
    link.download = nombreArchivo;
    link.href = canvas.toDataURL("image/png");
    link.click();
    
    const btn = document.getElementById("btnGuardar");
    const originalText = btn.innerHTML;
    btn.innerHTML = "✓ IMAGEN GUARDADA";
    setTimeout(() => {
      btn.innerHTML = originalText;
    }, 1500);
  }).catch(error => {
    console.error("Error:", error);
    alert("Error al generar la imagen.");
  });
}

document.getElementById("btnGuardar").addEventListener("click", guardarImagen);

// LocalStorage
tcBs.addEventListener("input", () => localStorage.setItem("tcBs", tcBs.value));
tcSb.addEventListener("input", () => localStorage.setItem("tcSb", tcSb.value));
ajuste.addEventListener("input", () => localStorage.setItem("ajuste", ajuste.value));
empresa.addEventListener("change", () => localStorage.setItem("empresa", empresa.value));
operacion.addEventListener("change", () => localStorage.setItem("operacion", operacion.value));
comision.addEventListener("input", () => localStorage.setItem("comision", comision.value));

window.addEventListener("load", () => {
  tcBs.value = localStorage.getItem("tcBs") || tcBs.value;
  tcSb.value = localStorage.getItem("tcSb") || tcSb.value;
  ajuste.value = localStorage.getItem("ajuste") || ajuste.value;
  empresa.value = localStorage.getItem("empresa") || empresa.value;
  operacion.value = localStorage.getItem("operacion") || operacion.value;
  comision.value = localStorage.getItem("comision") || comision.value;
  depositarInput.value = "";
  recibeInput.value = "";
  actualizarTodo();
});

actualizarTodo();
</script>
