<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Panel Giros | DONSOL Sin Comisión</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0a0f1a;
  font-family: 'Roboto', sans-serif;
  color: white;
  padding: 10px;
}

.container {
  max-width: 100%;
  margin: auto;
}

/* PANEL DE CONTROL */
.panel {
  background: #111c31;
  padding: 12px;
  border-radius: 0px;
  margin-bottom: 16px;
  border: 1px solid #1f3a5f;
}

/* FILA 1: Empresa + Operación + Botón */
.top-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  margin-bottom: 12px;
  flex-wrap: nowrap;
}

.top-row .field {
  flex: 1;
  min-width: 0;
}

.field label {
  display: block;
  margin-bottom: 4px;
  font-weight: 700;
  font-size: 0.6rem;
  letter-spacing: 0.5px;
  color: #9bb5d4;
  text-transform: uppercase;
  white-space: nowrap;
}

.field select, .field input {
  width: 100%;
  height: 38px;
  border: none;
  border-radius: 0px;
  padding: 0 8px;
  background: #1c2b48;
  color: #f5c542;
  font-weight: 600;
  font-family: 'Oswald', sans-serif;
  font-size: 0.75rem;
}

.btn-toggle {
  background: linear-gradient(135deg, #2a3a55, #1f2e48);
  border: 1px solid #f5b400;
  color: #f5b400;
  height: 38px;
  padding: 0 12px;
  border-radius: 0px;
  font-weight: 800;
  font-family: 'Oswald', sans-serif;
  font-size: 0.7rem;
  cursor: pointer;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 4px;
}

/* PANEL DE AJUSTES */
.ajustes-panel {
  background: #0f1825;
  border-radius: 0px;
  padding: 10px;
  margin: 8px 0 10px 0;
  border: 1px solid #2a3a55;
}

.ajustes-panel.hidden {
  display: none;
}

.ajustes-grid {
  display: flex;
  gap: 8px;
  flex-wrap: nowrap;
}

.ajustes-grid .field {
  flex: 1;
  min-width: 0;
}

.ajustes-grid .field input {
  height: 34px;
  font-size: 0.7rem;
  padding: 0 6px;
}

/* FILA 2: DEPOSITAR + RECIBE */
.monto-row {
  display: flex;
  gap: 10px;
  margin: 10px 0 12px 0;
  flex-wrap: nowrap;
}

.monto-field {
  flex: 1;
  min-width: 0;
}

.monto-field label {
  display: block;
  margin-bottom: 4px;
  font-weight: 700;
  font-size: 0.6rem;
  letter-spacing: 0.5px;
  color: #9bb5d4;
  text-transform: uppercase;
  white-space: nowrap;
}

.monto-field input {
  width: 100%;
  height: 42px;
  border: 1px solid #2a3a55;
  border-radius: 0px;
  padding: 0 8px;
  background: #1c2b48;
  color: #f5c542;
  font-weight: 700;
  font-family: 'Oswald', sans-serif;
  font-size: 0.85rem;
}

.monto-field input::placeholder {
  color: #5a6e8a;
  font-size: 0.7rem;
}

/* BOTONES */
.btn-group {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  flex-wrap: nowrap;
}

button {
  height: 40px;
  border: none;
  border-radius: 0px;
  font-weight: 800;
  font-family: 'Oswald', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.5px;
  cursor: pointer;
  flex: 1;
}

#btnLimpiar {
  background: #2a3a55;
  color: white;
  border: 1px solid #3e5a7c;
}

#btnGuardar {
  background: linear-gradient(135deg, #f5b400, #d49a00);
  color: #111;
}

button:active {
  transform: scale(0.97);
}

/* ============================================= */
/* TARJETA PRINCIPAL */
/* ============================================= */
.tarjeta {
  border-radius: 0px;
  overflow: hidden;
  box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
  background: #0f1622;
}

.encabezado {
  padding: 12px 10px;
  text-align: center;
}

.donsol {
  background: linear-gradient(135deg, #1a1200, #0d0800);
  color: #f0c84a;
  border-bottom: 1px solid #c9a84c;
}

.chaskys {
  background: linear-gradient(135deg, #0a1e3c, #001a4a);
  border-bottom: 2px solid #3a7adf;
  color: #5aaaf0;
}

.pacena {
  background: linear-gradient(135deg, #6a0f0f, #3a0505);
  border-bottom: 2px solid #ff6666;
  color: #ffffff;
}

.tituloEmpresa {
  font-family: 'Oswald', sans-serif;
  font-size: 1.3rem;
  font-weight: 800;
  letter-spacing: 1px;
  line-height: 1.2;
  color: inherit;
}

.operacion {
  margin-top: 5px;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 1px;
  background: rgba(0,0,0,0.35);
  display: inline-block;
  padding: 3px 10px;
  color: inherit;
}

.contenido {
  background: #0f1622;
  padding: 14px 12px;
}

.infoBox {
  background: rgba(255, 255, 255, 0.03);
  padding: 8px 10px;
  margin-bottom: 12px;
  border: 1px solid rgba(255, 215, 0, 0.1);
}

.infoRow {
  display: flex;
  justify-content: space-between;
  padding: 5px 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  font-size: 0.7rem;
}

.infoRow:last-child {
  border-bottom: none;
}

.infoRow span {
  color: #b9c3dc;
  text-transform: uppercase;
  font-weight: 600;
  font-size: 0.65rem;
}

.infoRow strong {
  color: #f3cd81;
  font-family: 'Oswald', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
}

.tarjeta.pacena .infoRow strong {
  color: #ffccaa;
}
.tarjeta.pacena .infoBox {
  border-color: rgba(255, 100, 100, 0.3);
  background: rgba(80, 20, 20, 0.2);
}

.seccionTitulo {
  text-align: center;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #9ca9c7;
  margin-top: 12px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.seccionTitulo::before,
.seccionTitulo::after {
  content: '';
  flex: 1;
  height: 1px;
  background: currentColor;
  opacity: 0.25;
}

.montoSec {
  text-align: center;
  font-size: 1.2rem;
  font-weight: 700;
  font-family: 'Oswald', sans-serif;
  color: #f3cd81;
}

.montoPrin {
  text-align: center;
  font-size: 1.8rem;
  font-weight: 800;
  font-family: 'Oswald', sans-serif;
  color: #f5b400;
  margin: 4px 0;
}

.moneda {
  text-align: center;
  font-size: 0.7rem;
  font-weight: 700;
  color: #d4b86a;
  text-transform: uppercase;
  letter-spacing: 2px;
}

.pacenaLinea {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: baseline;
  gap: 6px;
  font-size: 0.7rem;
  font-weight: 800;
  margin: 15px 0 10px;
  background: rgba(100, 20, 20, 0.7);
  padding: 10px 8px;
  border: 1px solid #ff7777;
}

.pacenaLinea span {
  color: #ffe0e0;
  font-weight: 600;
  font-size: 0.65rem;
}

.pacenaLinea strong {
  font-size: 1rem;
  font-family: 'Oswald', sans-serif;
  color: #ffffff;
  background: rgba(0,0,0,0.2);
  padding: 2px 6px;
}

.validityFooter {
  margin-top: 12px;
  text-align: center;
  font-size: 0.5rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #6c7b9e;
  border-top: 1px solid rgba(255,215,0,0.1);
  padding-top: 8px;
}

/* Pantallas muy pequeñas */
@media (max-width: 480px) {
  .top-row {
    gap: 5px;
  }
  .field select, .field input {
    font-size: 0.65rem;
    padding: 0 5px;
    height: 34px;
  }
  .btn-toggle {
    font-size: 0.6rem;
    padding: 0 8px;
    height: 34px;
  }
  .ajustes-grid {
    gap: 5px;
  }
  .ajustes-grid .field input {
    height: 30px;
    font-size: 0.6rem;
  }
  .monto-field input {
    height: 38px;
    font-size: 0.75rem;
  }
  button {
    height: 36px;
    font-size: 0.7rem;
  }
  .tituloEmpresa {
    font-size: 1.1rem;
  }
  .montoPrin {
    font-size: 1.5rem;
  }
}
</style>
</head>
<body>

<div class="container">

  <div class="panel">
    <!-- Línea 1: Empresa + Operación + Ajustes -->
    <div class="top-row">
      <div class="field">
        <label>EMPRESA</label>
        <select id="empresa">
          <option value="donsol">DONSOL</option>
          <option value="chaskys">CHASKYS GIROS</option>
          <option value="pacena">LA PACEÑA</option>
        </select>
      </div>
      <div class="field">
        <label>OPERACIÓN</label>
        <select id="operacion">
          <option value="bs_soles">Bs → Soles</option>
          <option value="soles_bs">Soles → Bs</option>
        </select>
      </div>
      <button class="btn-toggle" id="btnToggleAjustes">⚙️</button>
    </div>

    <!-- Panel de ajustes ocultable -->
    <div id="ajustesPanel" class="ajustes-panel hidden">
      <div class="ajustes-grid">
        <div class="field"><label>BS→SOL</label><input id="tcBs" value="2.92" step="0.01" type="number"></div>
        <div class="field"><label>SOL→BS</label><input id="tcSb" value="2.75" step="0.01" type="number"></div>
        <div class="field"><label>COMISIÓN</label><input id="comision" value="3" step="0.1" type="number"></div>
        <div class="field"><label>AJUSTE</label><input id="ajuste" value="0.03" step="0.01" type="number"></div>
      </div>
    </div>

    <!-- Línea 2: DEPOSITAR + RECIBE -->
    <div class="monto-row">
      <div class="monto-field">
        <label>DEPOSITAR</label>
        <input id="depositar" placeholder="0.00" type="number">
      </div>
      <div class="monto-field">
        <label>RECIBE</label>
        <input id="recibe" placeholder="0.00" type="number">
      </div>
    </div>

    <!-- Línea 3: Botones -->
    <div class="btn-group">
      <button id="btnLimpiar">LIMPIAR</button>
      <button id="btnGuardar">📸 GUARDAR</button>
    </div>
  </div>

  <!-- TARJETA PRINCIPAL -->
  <div id="tarjeta" class="tarjeta">
    <div id="encabezado" class="encabezado donsol">
      <div id="tituloEmpresa" class="tituloEmpresa">CAMBIOS DONSOL</div>
      <div id="operacionTexto" class="operacion">BOLIVIANOS → SOLES</div>
    </div>

    <div class="contenido">
      <div class="infoBox">
        <div class="infoRow">
          <span>TIPO DE CAMBIO</span>
          <strong id="tipoVista">2.95</strong>
        </div>
        <div class="infoRow" id="filaComision">
          <span>COMISIÓN</span>
          <strong id="comisionVista">3%</strong>
        </div>
      </div>

      <div id="modoNormal">
        <div class="seccionTitulo">USTED ENVÍA</div>
        <div id="enviaVista" class="montoSec">0.00</div>
        <div class="seccionTitulo" id="textoRecibe">RECIBE</div>
        <div id="recibeVista" class="montoPrin">0.00</div>
        <div id="monedaVista" class="moneda">SOLES</div>
      </div>

      <div id="modoPacena" style="display:none;">
        <div class="pacenaLinea">
          <span>DEPOSITAR</span>
          <strong id="depositarPacena">0.00</strong>
          <span id="monedaDepositaPacena">BS</span>
          <span>→</span>
          <span>RECIBE</span>
          <strong id="paraPacena">0.00</strong>
          <span id="monedaPacena">SOLES</span>
        </div>
      </div>

      <div class="validityFooter">
        Cotización referencial · Vigencia 15 min
      </div>
    </div>
  </div>
</div>

<script>
// ==================== CÓDIGO - DONSOL SIN COMISIÓN ====================
const empresa = document.getElementById("empresa");
const operacion = document.getElementById("operacion");
const tcBs = document.getElementById("tcBs");
const tcSb = document.getElementById("tcSb");
const comisionInput = document.getElementById("comision");
const ajuste = document.getElementById("ajuste");
const depositarInput = document.getElementById("depositar");
const recibeInput = document.getElementById("recibe");
const btnToggle = document.getElementById("btnToggleAjustes");
const ajustesPanel = document.getElementById("ajustesPanel");

let ultimoCampo = "depositar";

btnToggle.addEventListener("click", () => {
  ajustesPanel.classList.toggle("hidden");
  btnToggle.innerHTML = ajustesPanel.classList.contains("hidden") ? "⚙️" : "🔽";
});

function f(n) {
  if (isNaN(n) || n === null || n === undefined) return "0.00";
  return Number(n).toFixed(2);
}

// Obtener comisión efectiva según empresa (DONSOL = 0%)
function getComisionEfectiva() {
  let emp = empresa.value;
  if (emp === "donsol") return 0;
  return parseFloat(comisionInput.value || 0) / 100;
}

function calcularDesdeDepositar() {
  let emp = empresa.value;
  let op = operacion.value;
  
  let tc = op === "bs_soles"
    ? parseFloat(tcBs.value || 0)
    : parseFloat(tcSb.value || 0);
  
  let com = getComisionEfectiva();
  let aj = parseFloat(ajuste.value || 0);
  
  if (emp === "donsol") {
    tc = op === "bs_soles" ? tc + aj : tc - aj;
  }
  
  let depositoVal = parseFloat(depositarInput.value || 0);
  let resultado = 0;
  
  if (emp === "donsol") {
    // DONSOL: sin comisión
    if (op === "bs_soles") {
      resultado = depositoVal / tc;
    } else {
      resultado = depositoVal * tc;
    }
  } else {
    // CHASKYS y PACEÑA: con comisión
    if (op === "bs_soles") {
      let bsBase = depositoVal / (1 + com);
      resultado = bsBase / tc;
    } else {
      let bsBase = depositoVal * tc;
      resultado = bsBase - (bsBase * com);
    }
  }
  
  recibeInput.value = resultado !== 0 ? f(resultado) : "";
}

function calcularDesdeRecibe() {
  let emp = empresa.value;
  let op = operacion.value;
  
  let tc = op === "bs_soles"
    ? parseFloat(tcBs.value || 0)
    : parseFloat(tcSb.value || 0);
  
  let com = getComisionEfectiva();
  let aj = parseFloat(ajuste.value || 0);
  
  if (emp === "donsol") {
    tc = op === "bs_soles" ? tc + aj : tc - aj;
  }
  
  let recibeVal = parseFloat(recibeInput.value || 0);
  let resultado = 0;
  
  if (emp === "donsol") {
    // DONSOL: sin comisión
    if (op === "bs_soles") {
      resultado = recibeVal * tc;
    } else {
      resultado = recibeVal / tc;
    }
  } else {
    // CHASKYS y PACEÑA: con comisión
    if (op === "bs_soles") {
      let bsBase = recibeVal * tc;
      resultado = bsBase + (bsBase * com);
    } else {
      let bsBase = recibeVal / (1 - com);
      resultado = bsBase / tc;
    }
  }
  
  depositarInput.value = resultado !== 0 ? f(resultado) : "";
}

function actualizarTodo() {
  if (ultimoCampo === "depositar") {
    if (depositarInput.value !== "" && depositarInput.value !== null) {
      calcularDesdeDepositar();
    } else {
      recibeInput.value = "";
    }
  } else {
    if (recibeInput.value !== "" && recibeInput.value !== null) {
      calcularDesdeRecibe();
    } else {
      depositarInput.value = "";
    }
  }
  
  let emp = empresa.value;
  let op = operacion.value;
  
  let tc = op === "bs_soles"
    ? parseFloat(tcBs.value || 0)
    : parseFloat(tcSb.value || 0);
  
  let com = getComisionEfectiva();
  let aj = parseFloat(ajuste.value || 0);
  
  if (emp === "donsol") {
    tc = op === "bs_soles" ? tc + aj : tc - aj;
  }
  
  const encabezado = document.getElementById("encabezado");
  const tituloEmpresa = document.getElementById("tituloEmpresa");
  const operacionTexto = document.getElementById("operacionTexto");
  const filaComision = document.getElementById("filaComision");
  const tipoVista = document.getElementById("tipoVista");
  const comisionVista = document.getElementById("comisionVista");
  const enviaVista = document.getElementById("enviaVista");
  const recibeVista = document.getElementById("recibeVista");
  const monedaVista = document.getElementById("monedaVista");
  const textoRecibe = document.getElementById("textoRecibe");
  const modoNormal = document.getElementById("modoNormal");
  const modoPacena = document.getElementById("modoPacena");
  const depositarPacena = document.getElementById("depositarPacena");
  const paraPacena = document.getElementById("paraPacena");
  const monedaPacena = document.getElementById("monedaPacena");
  const monedaDepositaPacena = document.getElementById("monedaDepositaPacena");
  
  encabezado.className = "encabezado";
  encabezado.classList.remove("donsol", "chaskys", "pacena");
  
  if (emp === "donsol") {
    encabezado.classList.add("donsol");
    tituloEmpresa.innerHTML = "CAMBIOS DONSOL";
    filaComision.style.display = "none";
    textoRecibe.innerHTML = "RECIBE";
  } else if (emp === "chaskys") {
    encabezado.classList.add("chaskys");
    tituloEmpresa.innerHTML = "CHASKYS GIROS";
    filaComision.style.display = "flex";
    textoRecibe.innerHTML = "BENEFICIARIO RECIBE";
  } else if (emp === "pacena") {
    encabezado.classList.add("pacena");
    tituloEmpresa.innerHTML = "TRANSPORTADORA<br>LA PACEÑA";
    filaComision.style.display = "flex";
    textoRecibe.innerHTML = "RECIBE";
  }
  
  operacionTexto.innerHTML = op === "bs_soles" ? "BOLIVIANOS → SOLES" : "SOLES → BOLIVIANOS";
  tipoVista.innerHTML = f(tc);
  
  // Mostrar comisión solo si no es DONSOL
  if (emp === "donsol") {
    comisionVista.innerHTML = "";
  } else {
    comisionVista.innerHTML = (parseFloat(comisionInput.value || 0)) + "%";
  }
  
  const montoMostrar = (depositarInput.value === "" || depositarInput.value === null) ? "0.00" : f(parseFloat(depositarInput.value) || 0);
  const recibeMostrar = (recibeInput.value === "" || recibeInput.value === null) ? "0.00" : f(parseFloat(recibeInput.value) || 0);
  
  enviaVista.innerHTML = montoMostrar;
  recibeVista.innerHTML = recibeMostrar;
  
  monedaVista.innerHTML = op === "bs_soles" ? "SOLES" : "BS";
  
  depositarPacena.innerHTML = montoMostrar;
  paraPacena.innerHTML = recibeMostrar;
  monedaDepositaPacena.innerHTML = op === "bs_soles" ? "BS" : "SOLES";
  monedaPacena.innerHTML = op === "bs_soles" ? "SOLES" : "BS";
  
  const tarjetaElem = document.getElementById("tarjeta");
  if (emp === "pacena") {
    modoNormal.style.display = "none";
    modoPacena.style.display = "block";
    tarjetaElem.classList.add("pacena");
  } else {
    modoNormal.style.display = "block";
    modoPacena.style.display = "none";
    tarjetaElem.classList.remove("pacena");
  }
}

depositarInput.addEventListener("input", () => {
  ultimoCampo = "depositar";
  actualizarTodo();
});

recibeInput.addEventListener("input", () => {
  ultimoCampo = "recibe";
  actualizarTodo();
});

empresa.addEventListener("change", () => {
  if (ultimoCampo === "depositar" && depositarInput.value !== "") {
    calcularDesdeDepositar();
  } else if (ultimoCampo === "recibe" && recibeInput.value !== "") {
    calcularDesdeRecibe();
  }
  actualizarTodo();
});

operacion.addEventListener("change", () => {
  if (ultimoCampo === "depositar" && depositarInput.value !== "") {
    calcularDesdeDepositar();
  } else if (ultimoCampo === "recibe" && recibeInput.value !== "") {
    calcularDesdeRecibe();
  }
  actualizarTodo();
});

[tcBs, tcSb, comisionInput, ajuste].forEach(input => {
  input.addEventListener("input", () => {
    if (ultimoCampo === "depositar" && depositarInput.value !== "") {
      calcularDesdeDepositar();
    } else if (ultimoCampo === "recibe" && recibeInput.value !== "") {
      calcularDesdeRecibe();
    }
    actualizarTodo();
  });
});

document.getElementById("btnLimpiar").addEventListener("click", () => {
  depositarInput.value = "";
  recibeInput.value = "";
  ultimoCampo = "depositar";
  actualizarTodo();
});

function guardarImagen() {
  const tarjetaElem = document.getElementById("tarjeta");
  html2canvas(tarjetaElem, {
    scale: 2,
    backgroundColor: "#0f1622",
    logging: false
  }).then(canvas => {
    const link = document.createElement("a");
    const empresaActual = empresa.value;
    let nombreArchivo = "cotizacion.png";
    if (empresaActual === "donsol") nombreArchivo = "cotizacion_donsol.png";
    else if (empresaActual === "chaskys") nombreArchivo = "cotizacion_chaskys.png";
    else if (empresaActual === "pacena") nombreArchivo = "cotizacion_lapacena.png";
    
    link.download = nombreArchivo;
    link.href = canvas.toDataURL("image/png");
    link.click();
    
    const btn = document.getElementById("btnGuardar");
    const originalText = btn.innerHTML;
    btn.innerHTML = "✓ GUARDADO";
    setTimeout(() => {
      btn.innerHTML = "📸 GUARDAR";
    }, 1500);
  }).catch(error => {
    console.error("Error:", error);
    alert("Error al generar la imagen.");
  });
}

document.getElementById("btnGuardar").addEventListener("click", guardarImagen);

tcBs.addEventListener("input", () => localStorage.setItem("tcBs", tcBs.value));
tcSb.addEventListener("input", () => localStorage.setItem("tcSb", tcSb.value));
ajuste.addEventListener("input", () => localStorage.setItem("ajuste", ajuste.value));
empresa.addEventListener("change", () => localStorage.setItem("empresa", empresa.value));
operacion.addEventListener("change", () => localStorage.setItem("operacion", operacion.value));

window.addEventListener("load", () => {
  tcBs.value = localStorage.getItem("tcBs") || tcBs.value;
  tcSb.value = localStorage.getItem("tcSb") || tcSb.value;
  ajuste.value = localStorage.getItem("ajuste") || ajuste.value;
  empresa.value = localStorage.getItem("empresa") || empresa.value;
  operacion.value = localStorage.getItem("operacion") || operacion.value;
  comisionInput.value = localStorage.getItem("comision") || comisionInput.value;
  depositarInput.value = "";
  recibeInput.value = "";
  actualizarTodo();
});

actualizarTodo();
</script>
